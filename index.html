<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polymarket Drop Monitor</title>
    <style>
      :root {
        --bg: #070c12;
        --panel: #0d141d;
        --panel-2: #101b28;
        --line: #1f3247;
        --text: #d9e7f4;
        --muted: #7f97ad;
        --good: #83f7b8;
        --warn: #ffd46a;
        --bad: #ff7e7e;
        --blue: #66b6ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .app { padding: 14px; }
      .toolbar {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, auto));
        gap: 10px;
        align-items: center;
        margin-bottom: 12px;
      }
      .toolbar input, .toolbar select, .toolbar button {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--line);
        padding: 10px 12px;
        border-radius: 10px;
      }
      .toolbar button { cursor: pointer; }
      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }
      .card {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
      }
      .kpi { font-size: 22px; font-weight: 800; }
      .muted { color: var(--muted); }
      .layout {
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(360px, 1fr);
        gap: 12px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead { position: sticky; top: 0; background: #0a1017; }
      th, td {
        border-bottom: 1px solid rgba(255,255,255,0.05);
        padding: 8px 6px;
        text-align: left;
        vertical-align: middle;
      }
      tbody tr { cursor: pointer; }
      tbody tr:hover { background: rgba(102, 182, 255, 0.08); }
      .market-cell { min-width: 280px; }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        border: 1px solid var(--line);
      }
      .score-a { color: var(--good); }
      .score-b { color: var(--warn); }
      .score-c { color: var(--bad); }
      .whale { color: var(--blue); font-weight: 700; }
      .bad { color: var(--bad); }
      .good { color: var(--good); }
      .book-grid, .trades {
        display: grid;
        gap: 12px;
      }
      .book-columns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .level {
        display: grid;
        grid-template-columns: 70px 1fr;
        gap: 8px;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255,255,255,0.04);
      }
      .trade-row {
        display: grid;
        grid-template-columns: 60px 110px 1fr 80px 80px;
        gap: 8px;
        font-size: 12px;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .chart-wrap {
        width: 100%;
        height: 220px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #08111a;
      }
      canvas { width: 100%; height: 100%; display: block; }
      .headline { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      @media (max-width: 1200px) {
        .layout { grid-template-columns: 1fr; }
        .toolbar, .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="toolbar">
        <input id="backendUrl" value="http://localhost:3000" />
        <select id="windowSelect">
          <option value="1m">1m</option>
          <option value="3m">3m</option>
          <option value="15m">15m</option>
          <option value="60m" selected>60m</option>
        </select>
        <input id="minScore" type="number" value="30" min="0" max="100" step="1" />
        <input id="minDrop" type="number" value="1.5" min="0" max="100" step="0.1" />
        <input id="search" placeholder="search market" />
        <button id="refreshBtn">Refresh</button>
      </div>

      <div class="stats">
        <div class="card"><div class="muted">Rows</div><div class="kpi" id="rowsKpi">0</div></div>
        <div class="card"><div class="muted">Whales</div><div class="kpi" id="whalesKpi">0</div></div>
        <div class="card"><div class="muted">Avg score</div><div class="kpi" id="scoreKpi">0</div></div>
        <div class="card"><div class="muted">Last refresh</div><div class="kpi" id="refreshKpi">-</div></div>
      </div>

      <div class="layout">
        <div class="card">
          <div class="headline">
            <strong>Drop Feed</strong>
            <span class="muted mono">POD-style Polymarket monitor</span>
          </div>
          <div style="overflow:auto; max-height: 78vh; margin-top: 10px;">
            <table>
              <thead>
                <tr>
                  <th>Market</th>
                  <th>Now</th>
                  <th>Tick</th>
                  <th>Window</th>
                  <th>Open</th>
                  <th>Peak</th>
                  <th>Score</th>
                  <th>Type</th>
                  <th>Whale</th>
                  <th>Flow</th>
                </tr>
              </thead>
              <tbody id="feedBody"></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="headline">
            <strong id="detailsTitle">Select a market</strong>
            <span class="muted" id="detailsMeta">-</span>
          </div>

          <div class="chart-wrap" style="margin: 12px 0;">
            <canvas id="detailChart" width="600" height="220"></canvas>
          </div>

          <div class="book-grid">
            <div class="card" style="padding:10px;">
              <strong>Orderbook</strong>
              <div class="book-columns" style="margin-top:10px;">
                <div>
                  <div class="muted">Bids</div>
                  <div id="bids"></div>
                </div>
                <div>
                  <div class="muted">Asks</div>
                  <div id="asks"></div>
                </div>
              </div>
            </div>

            <div class="card" style="padding:10px;">
              <strong>Recent trades / wallets</strong>
              <div class="trades" id="tradesList" style="margin-top:10px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
