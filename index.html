<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BETTING MONITOR</title>

<style>
body{
background:#05070b;
color:#fff;
font-family:Arial;
margin:0;
}

header{
padding:12px 20px;
border-bottom:1px solid #222;
font-size:18px;
font-weight:bold;
letter-spacing:2px;
}

.container{
display:grid;
grid-template-columns: 1.5fr 1fr;
height:calc(100vh - 50px);
}

.feed{
border-right:1px solid #222;
overflow:auto;
}

.row{
padding:10px 15px;
border-bottom:1px solid #111;
cursor:pointer;
}

.row:hover{
background:#0f1524;
}

.sidebar{
padding:20px;
overflow:auto;
}

.timeline-row{
display:grid;
grid-template-columns:120px 100px 100px 120px 1fr;
padding:6px 0;
border-bottom:1px solid #111;
font-size:12px;
}

.wallet{
color:#6db1ff;
text-decoration:none;
}

.wallet:hover{
text-decoration:underline;
}

.title{
font-weight:bold;
margin-bottom:8px;
}

</style>
</head>

<body>

<header>BETTING MONITOR</header>

<div class="container">

<div class="feed" id="markets"></div>

<div class="sidebar">

<div class="title">MARKET TIMELINE</div>
<div id="timeline"></div>

</div>

</div>

<script>

const GAMMA="https://gamma-api.polymarket.com/events?active=true&closed=false&limit=200";
const TRADES="https://data-api.polymarket.com/trades";

let markets=[];
let selectedMarket=null;

async function loadMarkets(){

const r=await fetch(GAMMA);
const events=await r.json();

markets=[];

events.forEach(e=>{
if(!e.markets) return;

e.markets.forEach(m=>{

markets.push({
id:m.id,
question:m.question,
condition:m.conditionId
});

});
});

renderMarkets();
}

function renderMarkets(){

const el=document.getElementById("markets");

el.innerHTML=markets.map(m=>`
<div class="row" onclick="selectMarket('${m.condition}')">
${m.question}
</div>
`).join("");

}

async function selectMarket(id){

selectedMarket=id;

const r=await fetch(TRADES+"?market="+id+"&limit=50");
const trades=await r.json();

renderTimeline(trades);

}

function renderTimeline(trades){

const el=document.getElementById("timeline");

if(!trades.length){

el.innerHTML="No trades yet";
return;

}

el.innerHTML=trades.map(t=>{

const wallet=t.proxyWallet||t.wallet||"";

const walletLink=wallet
?`<a class="wallet" target="_blank" href="https://polymarket.com/profile/${wallet}">
${wallet}
</a>`
:"";

return`

<div class="timeline-row">

<div>${new Date(t.timestamp).toLocaleString()}</div>

<div>${(1/t.price).toFixed(2)}</div>

<div>${(t.price*100).toFixed(1)}%</div>

<div>$${(t.size*t.price).toFixed(0)}</div>

<div>${walletLink}</div>

</div>

`;

}).join("");

}

loadMarkets();

</script>

</body>
</html>
