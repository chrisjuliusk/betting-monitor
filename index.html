<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betting Monitor</title>

<style>

body{
margin:0;
background:#06080d;
color:#e8edff;
font-family:Inter,Arial;
}

.topbar{
display:flex;
justify-content:space-between;
padding:12px 18px;
border-bottom:1px solid rgba(255,255,255,.08);
background:#05070b;
}

.brand{
font-weight:700;
letter-spacing:.15em;
text-transform:uppercase;
font-size:13px;
}

.rows{
height:calc(100vh - 100px);
overflow:auto;
}

.row{
display:grid;
grid-template-columns:2fr .6fr .7fr .9fr .9fr .8fr .8fr .7fr .9fr;
gap:10px;
padding:10px 14px;
border-bottom:1px solid rgba(255,255,255,.06);
cursor:pointer;
font-size:12px;
}

.row:hover{
background:#101725;
}

.market-title{
font-weight:700;
font-size:13px;
}

.green{color:#39d98a}
.red{color:#ff6f7f}
.muted{color:rgba(255,255,255,.55)}

.layout{
display:grid;
grid-template-columns:2fr 1fr;
height:calc(100vh - 52px);
}

.sidebar{
border-left:1px solid rgba(255,255,255,.08);
padding:12px;
}

.chart{
height:220px;
border:1px solid rgba(255,255,255,.08);
border-radius:6px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="topbar">

<div class="brand">
Betting Monitor
</div>

<div>
<span id="status">Backend connected</span>
<span id="count"></span>
</div>

</div>

<div class="layout">

<div>

<div class="rows" id="rows"></div>

</div>

<div class="sidebar">

<div id="detail"></div>

<div class="chart" id="chart"></div>

<div id="timeline"></div>

</div>

</div>

<script>

const API="https://betting-monitor-backend.onrender.com"

let markets=[]
let timeline=[]
let selected=null

function odds(p){
if(p<=0||p>=1)return "—"
return (1/p).toFixed(3)
}

function usd(v){
return new Intl.NumberFormat('en-US',{
style:'currency',
currency:'USD',
maximumFractionDigits:0
}).format(v||0)
}

async function loadMarkets(){

const r=await fetch(API+"/api/markets")
markets=await r.json()

document.getElementById("count").innerText=
markets.length+" markets loaded"

renderRows()

}

async function loadTimeline(id){

const r=await fetch(API+"/api/timeline/"+id)

const data=await r.json()

timeline=data.timeline||[]

renderTimeline()

renderChart()

}

function renderRows(){

const el=document.getElementById("rows")

el.innerHTML=markets.map(m=>`

<div class="row" onclick="selectMarket('${m.id}')">

<div>
<div class="market-title">${m.market}</div>
<div class="muted">${m.category}</div>
</div>

<div>${m.outcome}</div>

<div class="green">live</div>

<div>${odds(m.previousPrice)} → ${odds(m.currentPrice)}</div>

<div>${odds(m.fairPrice)}</div>

<div>${m.dropPct.toFixed(2)}%</div>

<div>${usd(m.aggressiveFlowUsd)}</div>

<div>${m.smartWalletScore}</div>

<div>${m.signal}</div>

</div>

`).join("")

}

async function selectMarket(id){

selected=markets.find(x=>x.id===id)

renderDetail()

await loadTimeline(selected.conditionId)

}

function renderDetail(){

const d=document.getElementById("detail")

if(!selected){
d.innerHTML=""
return
}

d.innerHTML=`

<h3>${selected.market}</h3>

<div>Opening: ${odds(selected.openingPrice)}</div>

<div>Current: ${odds(selected.currentPrice)}</div>

<div>Fair: ${odds(selected.fairPrice)}</div>

<div>Wallet: ${selected.primaryWallet||"pending"}</div>

`

}

function renderTimeline(){

const el=document.getElementById("timeline")

if(!timeline.length){
el.innerHTML="loading timeline..."
return
}

el.innerHTML=timeline.map(t=>`

<div>

${new Date(t.time).toLocaleTimeString()}
${odds(t.price)}
${usd(t.size)}

</div>

`).join("")

}

function renderChart(){

const el=document.getElementById("chart")

if(!timeline.length){
el.innerHTML=""
return
}

const w=400
const h=220

const prices=timeline.map(t=>t.price)

const min=Math.min(...prices)
const max=Math.max(...prices)

const range=max-min||.001

const pts=timeline.map((t,i)=>{

const x=i/(timeline.length-1)*w
const y=h-(t.price-min)/range*h

return x+","+y

}).join(" ")

el.innerHTML=`<svg viewBox="0 0 ${w} ${h}">
<polyline
fill="none"
stroke="#62a9ff"
stroke-width="2"
points="${pts}"
/>
</svg>`

}

loadMarkets()

</script>

</body>
</html>
